{% extends "base.html" %}
{% block title %}Student Login{% endblock %}

{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Student Login</h1>

    {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
    {% if error   %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/student/login">
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" name="roll" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Login</button>
    </form>

    <p style="text-align:center; font-size:.8125rem; color:#64748b; margin-top:1rem;">
      New student? <a href="/student/register">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
