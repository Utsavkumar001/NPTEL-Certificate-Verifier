{% extends "base.html" %}
{% block title %}Error{% endblock %}

{% block body %}
<div style="min-height:calc(100vh - 56px); display:flex; align-items:center; justify-content:center; padding:2rem;">
  <div style="text-align:center; max-width:400px;">
    <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
    <div style="font-size:1.25rem; font-weight:600; color:#0f172a; margin-bottom:.75rem;">
      Something went wrong
    </div>
    <div style="font-size:.9375rem; color:#64748b; margin-bottom:2rem;">
      {{ message }}
    </div>
    <a href="/" class="btn btn-primary">Go to Home</a>
  </div>
</div>
{% endblock %}
