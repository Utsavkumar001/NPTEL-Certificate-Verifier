<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NPTEL Verifier{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────── */
    nav {
      background: #1e293b;
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    nav .brand { font-weight: 700; font-size: 1rem; letter-spacing: .3px; }
    nav .nav-right { display: flex; align-items: center; gap: 1.2rem; font-size: .875rem; }
    nav a { color: #94a3b8; text-decoration: none; }
    nav a:hover { color: #fff; }
    nav .user { color: #e2e8f0; }

    /* ── Layout ──────────────────────────── */
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .page-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: #0f172a; }

    /* ── Card ────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title { font-size: .875rem; font-weight: 600; color: #64748b;
                  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 1rem; }

    /* ── Form ────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .8125rem; font-weight: 500;
            color: #475569; margin-bottom: .35rem; }
    input[type=text], input[type=password], input[type=email],
    select, textarea {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid #cbd5e1; border-radius: 6px;
      font-size: .9375rem; color: #1e293b; background: #fff;
      outline: none; transition: border .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── Buttons ─────────────────────────── */
    .btn {
      display: inline-block; padding: .5rem 1.1rem;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: .875rem; font-weight: 500; text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-sm { padding: .3rem .75rem; font-size: .8125rem; }
    .btn-outline {
      background: transparent; border: 1px solid #cbd5e1; color: #475569;
    }

    /* ── Alerts ──────────────────────────── */
    .alert { padding: .75rem 1rem; border-radius: 6px; font-size: .875rem; margin-bottom: 1rem; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .alert-warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

    /* ── Table ───────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
    th { background: #f8fafc; color: #64748b; font-weight: 600;
         text-transform: uppercase; letter-spacing: .4px;
         padding: .6rem .8rem; text-align: left;
         border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    td { padding: .6rem .8rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }

    /* ── Badges ──────────────────────────── */
    .badge {
      display: inline-block; padding: .2rem .55rem;
      border-radius: 999px; font-size: .75rem; font-weight: 600;
    }
    .badge-pending  { background: #fef9c3; color: #854d0e; }
    .badge-approved { background: #dcfce7; color: #166534; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .badge-verified { background: #dbeafe; color: #1e40af; }
    .badge-eligible { background: #dcfce7; color: #166534; }
    .badge-none     { background: #f1f5f9; color: #64748b; }

    /* ── Auth pages ──────────────────────── */
    .auth-wrap {
      min-height: calc(100vh - 56px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 2rem; width: 100%; max-width: 420px;
    }
    .auth-card h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* ── Flash notice ─────────────────────── */
    .flash-notice {
      background: #fffbeb; border: 1px solid #fde68a;
      color: #78350f; padding: .75rem 1rem; border-radius: 6px;
      font-size: .8125rem; margin-top: 1.5rem;
    }

    /* ── Filter bar ──────────────────────── */
    .filter-bar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
    .filter-bar .form-group { margin-bottom: 0; }
    .filter-bar select { width: auto; min-width: 160px; }

    /* ── Modal ───────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 10px;
      padding: 1.75rem; width: 100%; max-width: 460px;
    }
    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .modal-footer { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.25rem; }
  </style>
</head>
<body>

<nav>
  <span class="brand">NPTEL Credit Transfer</span>
  <div class="nav-right">
    {% if request.session.get("user_name") %}
      <span class="user">{{ request.session["user_name"] }}</span>
      <a href="{% block logout_url %}#{% endblock %}">Logout</a>
    {% endif %}
  </div>
</nav>

{% block body %}{% endblock %}

</body>
</html>
